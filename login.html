<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grow Funds - Login</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 90%; max-width: 400px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .btn-login { background: #1a73e8; color: white; border: none; width: 100%; padding: 15px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        a { color: #1a73e8; text-decoration: none; font-size: 14px; }
    </style>
</head>
<body>

<div class="login-card">
    <h2>Welcome Back</h2>
    <p>Login to manage your funds</p>
    
    <input type="email" id="loginEmail" placeholder="Email Address">
    <input type="password" id="loginPassword" placeholder="Password">
    
    <button class="btn-login" onclick="handleLogin()">Login</button>
    
    <p style="margin-top: 15px;">New here? <a href="signup.html">Create Account</a></p>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyATHzKZbEV-G8geYqawjooNvBXO7w39bFc",
        authDomain: "grow-funds-ee038.firebaseapp.com",
        projectId: "grow-funds-ee038",
        storageBucket: "grow-funds-ee038.firebasestorage.app",
        messagingSenderId: "823406942973",
        appId: "1:823406942973:web:362e219ad44856efa17c94"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    async function handleLogin() {
        const email = document.getElementById('loginEmail').value;
        const pass = document.getElementById('loginPassword').value;

        try {
            // Find the user with this email and password
            const snapshot = await db.collection("users")
                .where("email", "==", email)
                .where("password", "==", pass)
                .get();

            if (snapshot.empty) {
                alert("Invalid email or password");
            } else {
                // Save the ID of the user who logged in
                snapshot.forEach(doc => {
                    localStorage.setItem("userId", doc.id);
                });
                window.location.href = "index.html";
            }
        } catch (error) {
            alert("Error logging in: " + error.message);
        }
    }
</script>
</body>
</html>
