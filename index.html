<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grow Funds - Dashboard</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; margin: 0; padding: 15px; }
        .header { background: #1a73e8; color: white; padding: 20px; border-radius: 15px; margin-bottom: 20px; }
        .balance-card { text-align: center; }
        .balance-amount { font-size: 32px; font-weight: bold; }
        
        .section-title { margin: 20px 0 10px; font-weight: bold; color: #333; }
        
        .plans-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .plan-card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); text-align: center; border: 1px solid #eee; }
        .plan-price { font-size: 18px; font-weight: bold; color: #2ecc71; margin: 5px 0; }
        .plan-roi { font-size: 12px; color: #666; margin-bottom: 10px; }
        
        .buy-btn { background: #1a73e8; color: white; border: none; padding: 8px; border-radius: 6px; width: 100%; font-weight: bold; cursor: pointer; }
        .nav-buttons { display: flex; gap: 10px; margin-top: 20px; }
        .nav-btn { flex: 1; padding: 15px; border-radius: 10px; border: none; font-weight: bold; color: white; text-decoration: none; text-align: center; }
    </style>
</head>
<body>

<div class="header">
    <div class="balance-card">
        <p>Total Balance</p>
        <div class="balance-amount" id="userBalance">GHS 0.00</div>
        <p id="welcomeName">Welcome back!</p>
    </div>
</div>

<div class="nav-buttons">
    <a href="deposit.html" class="nav-btn" style="background: #27ae60;">Deposit</a>
    <a href="withdraw.html" class="nav-btn" style="background: #e67e22;">Withdraw</a>
</div>

<div class="section-title">Investment Plans (Daily ROI)</div>

<div class="plans-grid" id="plansContainer">
    </div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyATHzKZbEV-G8geYqawjooNvBXO7w39bFc",
        authDomain: "grow-funds-ee038.firebaseapp.com",
        projectId: "grow-funds-ee038",
        storageBucket: "grow-funds-ee038.firebasestorage.app",
        messagingSenderId: "823406942973",
        appId: "1:823406942973:web:362e219ad44856efa17c94"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // The 8 plans you requested
    const planAmounts = [50, 70, 90, 100, 130, 150, 170, 200];
    const container = document.getElementById('plansContainer');

    // Create the HTML for the plans
    planAmounts.forEach(amount => {
        const roi = amount >= 150 ? "7.5%" : (amount >= 90 ? "6%" : "5%");
        container.innerHTML += `
            <div class="plan-card">
                <h4>Plan</h4>
                <div class="plan-price">GHS ${amount}</div>
                <div class="plan-roi">${roi} Daily</div>
                <button class="buy-btn" onclick="invest(${amount})">Invest Now</button>
            </div>
        `;
    });

    async function loadUserData() {
        const userId = localStorage.getItem("userId");
        if (!userId) {
            window.location.href = "signup.html";
            return;
        }

        const doc = await db.collection("users").doc(userId).get();
        if (doc.exists) {
            const data = doc.data();
            document.getElementById('userBalance').innerText = "GHS " + data.balance.toFixed(2);
            document.getElementById('welcomeName').innerText = "Welcome, " + data.fullName;
        }
    }

    async function invest(amount) {
        const userId = localStorage.getItem("userId");
        const userRef = db.collection("users").doc(userId);
        const doc = await userRef.get();
        const currentBalance = doc.data().balance;

        if (currentBalance >= amount) {
            await userRef.update({
                balance: currentBalance - amount,
                hasPurchasedPlan: true,
                activePlanAmount: amount,
                lastProfitDate: new Date()
            });
            alert("GHS " + amount + " Plan Activated!");
            location.reload();
        } else {
            alert("Insufficient Funds. Min deposit is GHS 50.");
        }
    }

    loadUserData();
</script>

</body>
</html>
